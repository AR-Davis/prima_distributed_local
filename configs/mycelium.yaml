# Mycelium API Configuration
# The Mycelium: distributed inference across the Coven

server:
  host: "0.0.0.0"
  port: 11435  # One port above Ollama so they coexist

routing:
  # Huginn: fast local queries
  # Routes to local/GPU nodes for low latency
  huginn:
    pools:
      - local
    timeout: 30s

  # Muninn: deep remote responses
  # Routes to remote/edge nodes for distributed compute
  muninn:
    pools:
      - remote
      - edge
      - local
    timeout: 300s

  # Skald: precise vocabulary
  # Routes to local for deterministic output
  skald:
    pools:
      - local
    timeout: 30s

  # Default routing when no profile matches
  default: "huginn"

  # Fallback to local Ollama when all Mycelium nodes are down
  fallback_local: "localhost:11434"

nodes:
  # Hearth: TheTower GPU (GTX 1650)
  # Runs Ollama with CUDA acceleration
  - name: hearth
    host: "localhost"
    api_port: 11434  # Ollama HTTP API
    type: gpu
    pool: local
    weight: 10

  # Ember: AMD E-350 CPU worker
  # Runs prima.cpp rpc-server via Tailscale
  - name: ember
    host: "100.90.116.1"
    port: 50052  # prima.cpp RPC port
    type: cpu
    pool: remote
    weight: 1
    timeout: 300s

  # Pixel 2: Snapdragon 835 ARM worker
  # Runs prima.cpp rpc-server in Termux
  - name: pixel-2
    host: "100.77.170.98"
    port: 50052  # prima.cpp RPC port
    type: arm
    pool: edge
    weight: 3
    timeout: 60s

logging:
  level: "info"
  format: "text"
