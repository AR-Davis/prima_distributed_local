# Prima Distributed Local - Cluster Configuration
# This is a template configuration file.
# Copy this to cluster.toml and customize for your setup.

[cluster]
# Name of your cluster (should be unique)
name = "my-prima-cluster"

# Head node address (IP:port)
head_node = "192.168.1.10:50052"

# Access model: "personal", "friend", or "discord"
access_model = "personal"

# For "friend" or "discord" mode - authentication token
# auth_token = "your-secure-token-here"

# For "personal" mode - optional network key for encryption
# network_key = "your-network-key-here"

[node]
# Node name (defaults to hostname if empty)
name = ""

# Tier: "auto" (detect), "lightweight", "middle", or "full"
tier = "auto"

[node.resources]
# Resource limits (0 = unlimited for some values)
cpu_percent = 50          # Max CPU usage percentage
memory_gb = 4             # Max RAM usage in GB
gpu_layers = 0            # GPU layers to offload (0 = auto-detect)
disk_cache_gb = 0         # Disk cache size (0 = auto)

[node.schedule]
# Scheduling controls
enabled = true
idle_detection = true
idle_minutes = 5

# Optional: Only run during certain hours
# Format: "HH:MM-HH:MM" (24-hour)
# active_hours = "22:00-08:00"

# Optional: Only run on certain days
# days_of_week = ["Mon", "Tue", "Wed", "Thu", "Fri"]

[web_dashboard]
# Built-in web dashboard
enabled = true
host = "127.0.0.1"
port = 8080

[update]
# Auto-update settings
channel = "stable"        # "stable", "beta", or "nightly"
auto_update = true
check_interval = "24h"

[logging]
# Logging configuration
level = "info"            # "debug", "info", "warn", "error"
file = ""                 # Log file path (empty = stderr)
max_size_mb = 100         # Max log file size
max_backups = 3           # Number of backups to keep

[prima]
# Prima.cpp binary configuration
# binary_path = ""        # Path to prima binary (empty = auto-download)
# model_path = ""         # Path to GGUF models
# args = []               # Additional arguments to pass to prima
