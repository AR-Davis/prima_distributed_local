# Discord Bot Configuration
# For running a public-facing bot with strict resource limits

[cluster]
name = "discord-bot-cluster"
head_node = ""  # Your public server address
access_model = "discord"
# auth_token must be set for Discord mode

[node]
tier = "middle"  # Never use full tier for public bots
name = "discord-node"

[node.resources]
cpu_percent = 25          # Strict limit for public access
memory_gb = 2             # Conservative memory limit
gpu_layers = 0            # CPU only for safety

[node.schedule]
enabled = true
idle_detection = false    # Always on

[web_dashboard]
enabled = true
host = "127.0.0.1"
port = 8080

# Additional Discord-specific settings
[discord]
rate_limit_per_minute = 10
max_prompt_length = 4000
timeout_seconds = 30
sandbox = true
