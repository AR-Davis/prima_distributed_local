# Personal LAN Configuration
# For home networks where all devices are trusted

[cluster]
name = "home-cluster"
head_node = "192.168.1.10:50052"
access_model = "personal"

[node]
tier = "auto"

[node.resources]
cpu_percent = 75
memory_gb = 8
gpu_layers = 0

[node.schedule]
enabled = true
idle_detection = true
idle_minutes = 3

[web_dashboard]
enabled = true
host = "0.0.0.0"  # Listen on all interfaces for LAN access
port = 8080
